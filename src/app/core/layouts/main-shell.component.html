<div class="app-shell">
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">C</div>
      <div>
        <h1>Credenza</h1>
      </div>
    </div>

    <nav class="nav">
      <div class="nav-main">
        <a
          *ngFor="let item of mainNavItems"
          [routerLink]="item.route"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: item.route === '/' }"
        >
          {{ item.label }}
        </a>
      </div>

      <ng-container *ngIf="mockDataService.isLoggedIn()">
        <a
          class="account-btn"
          routerLink="/perfil"
          routerLinkActive="active"
        >
          Cuenta
        </a>
      </ng-container>
      <ng-container *ngIf="!mockDataService.isLoggedIn()">
        <a
          class="account-btn"
          routerLink="/login"
          routerLinkActive="active"
        >
          Iniciar sesión
        </a>
      </ng-container>
    </nav>
  </header>

  <main class="container">
    <router-outlet></router-outlet>
  </main>
</div>
