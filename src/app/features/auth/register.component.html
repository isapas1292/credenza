<section class="auth-layout animate-fade-in">
  <article class="auth-visual register-visual">
    <div class="visual-content">
      <div class="brand-mark">C</div>
      <h2>Empieza tu camino</h2>
      <p>Crea tu cuenta en minutos y comienza a evaluar productos, servicios y préstamos con el respaldo de tus propios datos financieros.</p>
    </div>
    <!-- Abstract shapes -->
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
  </article>

  <article class="auth-form-container">
    <div class="auth-form-inner">
      <div class="page-title">
        <span class="eyebrow">Registro Seguro</span>
        <h2>Crear Cuenta</h2>
      </div>

      <div class="login-fields field-grid delay-100 animate-fade-in-up">
        <div class="field">
          <label>Nombre</label>
          <input [(ngModel)]="model.firstName" name="firstName" type="text" placeholder="Ej. Ramón">
        </div>
        <div class="field">
          <label>Apellido</label>
          <input [(ngModel)]="model.lastName" name="lastName" type="text" placeholder="Ej. Gómez">
        </div>
        <div class="field field-full">
          <label>Correo electrónico</label>
          <input [(ngModel)]="model.email" name="email" type="email" placeholder="correo@ejemplo.com">
        </div>
        <div class="field">
          <label>Contraseña</label>
          <input [(ngModel)]="model.password" name="password" type="password" placeholder="••••••••">
        </div>
        <div class="field">
          <label>Confirmar contraseña</label>
          <input [(ngModel)]="model.confirmPassword" name="confirmPassword" type="password" placeholder="••••••••">
        </div>
        <div class="field field-full">
          <label>Ciudad</label>
          <input [(ngModel)]="model.city" name="city" type="text" placeholder="Ej. Santo Domingo">
        </div>
        <div class="field field-full">
          <label>Objetivo principal (Opcional)</label>
          <textarea [(ngModel)]="model.goal" name="goal" placeholder="¿Qué buscas analizar o lograr en la plataforma?" rows="3"></textarea>
        </div>
      </div>

      <div class="button-wrap delay-200 animate-fade-in-up">
        <button class="btn btn-primary" style="width: 100%;" type="button" (click)="register()">Completar Registro</button>
      </div>

      <div class="auth-switch delay-300 animate-fade-in-up">
        <span>¿Ya tienes cuenta?</span>
        <a routerLink="/login">Inicia sesión aquí</a>
      </div>
    </div>
  </article>
</section>
